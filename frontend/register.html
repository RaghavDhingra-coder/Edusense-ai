<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - EduSense AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .registration-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .registration-form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .capture-method {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .method-option {
            flex: 1;
            padding: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        
        .method-option:hover {
            border-color: #4f46e5;
            background: #f9fafb;
        }
        
        .method-option.active {
            border-color: #4f46e5;
            background: #eef2ff;
        }
        
        .method-option i {
            font-size: 48px;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        
        .captured-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        
        .captured-image {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e5e7eb;
        }
        
        .captured-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .captured-image .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .students-list {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .student-item:last-child {
            border-bottom: none;
        }
        
        .student-info h3 {
            margin: 0 0 5px 0;
            color: #111827;
        }
        
        .student-info p {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
        }
        
        .student-actions button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .student-actions button:hover {
            background: #dc2626;
        }
        
        .btn-capture {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-capture:hover {
            background: #059669;
        }
        
        .btn-capture:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .btn-register {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
        }
        
        .btn-register:hover {
            background: #4338ca;
        }
        
        .btn-register:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .status-message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-message.info {
            background: #dbeafe;
            color: #1e40af;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>EduSense AI - Student Registration</h1>
                </div>
                <div class="header-actions">
                    <a href="index_integrated.html" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i>
                        Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="registration-container">
        
        <!-- Status Message -->
        <div id="statusMessage" style="display: none;"></div>
        
        <!-- Registration Form -->
        <div class="registration-form">
            <h2><i class="fas fa-user-plus"></i> Register New Student</h2>
            
            <form id="registrationForm">
                <div class="form-group">
                    <label for="studentName">Student Name *</label>
                    <input type="text" id="studentName" placeholder="Enter full name" required>
                </div>
                
                <div class="form-group">
                    <label for="studentId">Student ID / USN *</label>
                    <input type="text" id="studentId" placeholder="Enter student ID" required>
                </div>
                
                <div class="form-group">
                    <label>Capture Method *</label>
                    <div class="capture-method">
                        <div class="method-option active" data-method="camera">
                            <i class="fas fa-camera"></i>
                            <h3>From Camera</h3>
                            <p>Capture from live feed</p>
                        </div>
                        <div class="method-option" data-method="upload">
                            <i class="fas fa-upload"></i>
                            <h3>Upload Images</h3>
                            <p>Upload face photos</p>
                        </div>
                    </div>
                </div>
                
                <!-- Camera Capture -->
                <div id="cameraCapture" class="capture-section">
                    <button type="button" class="btn-capture" id="captureBtn">
                        <i class="fas fa-camera"></i>
                        Capture 10 Face Images
                    </button>
                    <p style="margin-top: 10px; color: #6b7280;">
                        <i class="fas fa-info-circle"></i>
                        Make sure camera is running in the main dashboard
                    </p>
                </div>
                
                <!-- Upload Images -->
                <div id="uploadCapture" class="capture-section" style="display: none;">
                    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
                    <button type="button" class="btn-capture" id="uploadBtn">
                        <i class="fas fa-folder-open"></i>
                        Select Face Images
                    </button>
                    <p style="margin-top: 10px; color: #6b7280;">
                        <i class="fas fa-info-circle"></i>
                        Select 3-20 clear face photos
                    </p>
                </div>
                
                <!-- Captured/Uploaded Images -->
                <div id="capturedImages" class="captured-images"></div>
                
                <!-- Register Button -->
                <button type="submit" class="btn-register" id="registerBtn" disabled>
                    <i class="fas fa-check"></i>
                    Register Student
                </button>
            </form>
        </div>
        
        <!-- Registered Students List -->
        <div class="students-list">
            <h2><i class="fas fa-users"></i> Registered Students (<span id="studentCount">0</span>)</h2>
            <div id="studentsList"></div>
        </div>
        
    </main>

    <script src="register.js"></script>
</body>
</html>
